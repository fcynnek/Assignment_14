<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Channels</title>
</head>

<body>
    <h2 class="welcomeUserMsg"></h2>
    <div class="containerChannelList">
        <ul class="channelList">
            <li th:each="channel : ${channels}">
                <a class="channleListLinks" th:href="@{/channels/{channelId}(channelId=${channel.channelId})}"
                    th:text="${channel.name}"></a>
            </li>
        </ul>
    </div>

    <h3 th:if="${channel != null}">
        Welcome to: <span th:text="${channel.name}" class="channelName"></span>
    </h3>

    <div th:if="${channel != null}" class="messageInput">
        <form th:action="@{/channels/{channelId}/sendMessage(channelId=${channel.channelId})}" method="post">
            <input type="hidden" name="username" th:value="${username}" class="messageBox" />
            <input type="text" name="message" class="messageBox" />
            <button type="submit" id="sendMessage">Send Message</button>
        </form>
        <div>
            <a href="/channels" class="backChannel">Go Back</a>
        </div>
    </div>

    <div id="messageList" class="message-container"></div>

    <script type="text/javascript" src="/js/channels.js"></script>
</body>

</html>
